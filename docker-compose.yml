services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-streetfiles}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-streetfiles}
      POSTGRES_DB: ${DB_DATABASE:-streetfiles}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-streetfiles}"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "8056:8055"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET: ${DIRECTUS_SECRET:-change-this-to-a-secure-random-string-min-32}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-streetfiles}
      DB_USER: ${DB_USER:-streetfiles}
      DB_PASSWORD: ${DB_PASSWORD:-streetfiles}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8056}
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_ROOT: /directus/uploads
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"   # erlaubt alle Origins; in Prod auf Domain einschränken
      TELEMETRY: "false"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* werden zur Build-Zeit in das Image gebrannt
        NEXT_PUBLIC_DIRECTUS_URL: ${NEXT_PUBLIC_DIRECTUS_URL:-http://localhost:8056}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - directus
    environment:
      # Server-seitige Vars (nicht im Browser sichtbar)
      # Intern im Docker-Netzwerk: directus:8055 (ohne externen Port-Mapping)
      DIRECTUS_INTERNAL_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-streetfiles-dev-token-2024}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string-min-32}
      WEEK_HASH_SECRET: ${WEEK_HASH_SECRET:-change-this-week-secret}
      NODE_ENV: production

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
